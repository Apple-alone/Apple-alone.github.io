<html>

<head>
    <meta charset="utf8">
    <meta name="viewport"
    content="width=device-width,initial-scale=1.0">
    <title>Around-Apple的个人网站</title>
<style>
    @import url(https://Apple-alone.github.io/Font.ttf); 
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Bad Script',cursive;
}

body{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #111;
}

h2{
    display: flex;
    color:transparent;
    font-size: 15vw;
}

h2 span
{
    animation: animate 3s linear infinite;
    animation-delay: calc(0.1s * var(--i));
}

@keyframes animate
{
    0%
    {
        color: #fff;
        filter: blur(1px) hue-rotate(0deg);
        text-shadow: 0 0 10px #00b3ff,
        0 0 20px #00b3ff,
        0 0 40px #00b3ff,
        0 0 80px #00b3ff,
        0 0 120px #00b3ff,
        0 0 200px #00b3ff,
        0 0 300px #00b3ff,
        0 0 40px #00b3ff;
    }

    30%,70%
    {
        color: #fff;
        filter: blur(1px) hue-rotate(360deg);
        text-shadow: 0 0 10px #00b3ff,
        0 0 20px #00b3ff,
        0 0 40px #00b3ff,
        0 0 80px #00b3ff,
        0 0 120px #00b3ff,
        0 0 200px #00b3ff;
    }
    
    100%
    {
        color: transparent;
        box-shadow: none;
        filter: blur(1px) hue-rotate(0deg)
    }
}
</style>

</head>
<body>
    <h2>
        <span style="--i:1;">艾</span>
        <span style="--i:2;">唯</span>
        <span style="--i:3;">生</span>
        <span style="--i:4;">日</span>
        <span style="--i:5;">快</span>
        <span style="--i:6;">乐</span>
    </h2>
</body>
</html>
